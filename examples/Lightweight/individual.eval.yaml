suite: RetailPulse Individual Questions
type: individual
description: >
  Individual questions about the Retail Pulse Power BI report. Each question is executed
  in a fresh, isolated Copilot session with no prior context.
defaults:
  pass_threshold: 70

questions:
  - id: q-find-workspace
    question: "Find the workspace FabricIQEavalSample"
    expected: "Found it, ID:  e9fb55c2-dddd-aaaa-bbbb-123412341234."
    assertions:
      - "Must include this workspace ID:  e9fb55c2-dddd-aaaa-bbbb-123412341234"
    tags: [workspace, find]

  - id: q-find-report
    question: "Find me the report named Retail Pulse"
    expected: "Report: Retail Pulse, ID: e9fb55c2-dddd-aaaa-bbbb-123412341235"
    assertions:
      - "Must include this report ID: e9fb55c2-dddd-aaaa-bbbb-123412341235"
    tags: [report, find]
